{% extends "base_auth.html" %}
{% load static %}
{% load crispy_forms_tags %}


{% block title %}Register{% endblock %}

{% block content %}
<div class="container-fluid mt-5 mb-5">
  <div class="d-lg-flex half">
    <div class="bg order-1 order-md-2 me-5" style="background: rgb(131,58,180); background: linear-gradient(90deg, rgba(131,58,180,1) 0%, rgba(175,27,27,1) 91%);">
      <img src="{% static 'images\page_images\Cat5.png' %}" alt="" style="height: 650px; margin-top: 50px;">
    </div>
    <div class="contents order-2 order-md-1" style="background-color: aliceblue; margin-left: 90px; width: 800px;">
      <div class="container">
        <div class="row align-items-center justify-content-center">
          <div class="col-md-7 mt-5">
            <h3 class="mb-5">Register to <strong>Cat Blog</strong></h3>
            <form action="{% url 'registerUser' %}" method="post">
              {% csrf_token %}
              {{ form|crispy  }}
              <input type="submit" value="Register" class="btn btn-block btn-primary mb-3">
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
