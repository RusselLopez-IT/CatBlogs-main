{% extends "base_auth.html" %}
{% load static %}
{% load crispy_forms_tags %}


{% block title %}Login{% endblock %}

{% block content %}
<div class="container-fluid mt-5 d-flex justify-content-center">
  <div class="d-lg-flex half">
    <div class="bg order-1 order-md-2" style="background: rgb(131,58,180); background: linear-gradient(90deg, rgba(131,58,180,1) 0%, rgba(175,27,27,1) 91%);">
      <img src="{% static 'images\page_images\Cat9.png' %}" alt="">
    </div>
    <div class="contents order-2 order-md-1 pe-5" style="background-color: aliceblue; width: 500px;">
      <div class="container">
        <div class="row align-items-center justify-content-center">
          <div class="col-md-7 mt-5">
            <h3 class="mb-5">Login to <strong>Cat Blog</strong></h3>
            <form action="{% url 'loginUser' %}" method="post">
              {% csrf_token %}
              {{ form|crispy }}
              <input type="submit" value="Log In" class="btn btn-primary ms-5" style="width: 150px;">
              <div class="d-flex mt-3 justify-content-center">
                <span>or</span>
              </div>
              <div class="d-flex mt-3 ms-3 justify-content-center">
                <a href="{% url 'registerUser' %}" style="text-decoration: none; color: #208dc8;"><strong>Create an Account</strong></a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
