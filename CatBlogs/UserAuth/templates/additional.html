{% extends "base_auth.html" %}
{% load static %}
{% load crispy_forms_tags %}


{% block title %}Finishing Up{% endblock %}

{% block content %}
<div class="container-fluid d-flex justify-content-center mt-5">
  <div class="d-lg-flex half">
    <div class="bg order-1 order-md-2 me-5" style="background: rgb(131,58,180); background: linear-gradient(90deg, rgba(131,58,180,1) 0%, rgba(175,27,27,1) 91%);">
      <img src="{% static 'images\page_images\Cat9.png' %}" alt="">
    </div>
    <div class="contents order-2 order-md-1" style="background-color: aliceblue; margin-left: 90px;">
      <div class="container">
        <div class="row align-items-center justify-content-center">
          <div class="col-md-7 mt-5">
            <h3 class="mb-1">Welcome, <strong>{{ request.user.username }}</strong></h3>
            <p class="mb-4"><small>Finishing Up..</small></p>
            <form action="{% url 'additionalInfo' %}" method="post"  enctype="multipart/form-data">
              {% csrf_token %}
              {{ form|crispy }}
              <input type="submit" value="Register" class="btn btn-block btn-primary">
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
